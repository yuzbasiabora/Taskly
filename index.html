<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Taskly – Task Manager</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;1,400&family=Cormorant+Garamond:ital,wght@1,400;1,500&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<!-- TOAST NOTIFICATION -->
<div id="toast" class="toast" aria-live="polite"></div>

<!-- CLEAR ALL CONFIRM DIALOG -->
<div class="modal-overlay" id="confirm-modal">
  <div class="modal confirm-modal">
    <div class="confirm-icon">🗑️</div>
    <h2>Clear All Tasks?</h2>
    <p>This will permanently delete all tasks. This cannot be undone.</p>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeConfirm()">Cancel</button>
      <button class="btn-danger" onclick="confirmClearAll()">Yes, Clear All</button>
    </div>
  </div>
</div>

<div class="wrapper">

  <!-- HEADER -->
  <header>
    <div class="header-left">
      <h1>Task<span>ly</span></h1>
      <div class="byline">made by Bora Yuzbasi</div>
    </div>
    <div class="header-right">
      <div class="date-line" id="date-line"></div>
      <button class="btn-theme" id="theme-toggle" onclick="toggleTheme()" title="Toggle dark mode">🌙</button>
    </div>
  </header>

  <!-- STATS BAR -->
  <div class="stats">
    <div class="stat">
      <div class="stat-num" id="stat-total">0</div>
      <div class="stat-label">Total</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-active">0</div>
      <div class="stat-label">Active</div>
    </div>
    <div class="stat">
      <div class="stat-num" id="stat-done">0</div>
      <div class="stat-label">Done</div>
    </div>
    <div class="stat">
      <div class="stat-num stat-overdue" id="stat-overdue">0</div>
      <div class="stat-label">Overdue</div>
    </div>
  </div>

  <!-- PROGRESS BAR -->
  <div class="progress-wrap" id="progress-wrap">
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill"></div>
    </div>
    <div class="progress-label" id="progress-label">0% complete</div>
  </div>

  <!-- ADD TASK CARD -->
  <div class="add-card">
    <div class="add-row">
      <input type="text" id="task-input" placeholder="Add a new task…" autocomplete="off" maxlength="120"/>
      <button class="btn-add" onclick="addTask()">+ Add</button>
    </div>
    <div class="meta-row">
      <select id="task-priority">
        <option value="low">🟢 Low</option>
        <option value="med" selected>🟡 Medium</option>
        <option value="high">🔴 High</option>
      </select>
      <select id="task-category">
        <option value="">📁 No Category</option>
        <option value="work">💼 Work</option>
        <option value="personal">🏠 Personal</option>
        <option value="school">🎓 School</option>
        <option value="health">💪 Health</option>
        <option value="other">⚡ Other</option>
      </select>
      <input type="date" id="task-due"/>
    </div>
  </div>

  <!-- SEARCH + SORT + CLEAR -->
  <div class="toolbar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="search-input" placeholder="Search tasks…" oninput="render()" autocomplete="off"/>
    </div>
    <div class="toolbar-right">
      <select id="sort-select" onchange="render()">
        <option value="default">Sort: Default</option>
        <option value="priority">Sort: Priority</option>
        <option value="due">Sort: Due Date</option>
        <option value="alpha">Sort: A–Z</option>
        <option value="created">Sort: Newest</option>
      </select>
      <button class="btn-clear-all" onclick="openConfirm()" title="Clear all tasks">🗑 Clear All</button>
    </div>
  </div>

  <!-- FILTERS -->
  <div class="filters">
    <button class="filter-btn active" data-filter="all"      onclick="setFilter(this,'all')">All</button>
    <button class="filter-btn"        data-filter="active"   onclick="setFilter(this,'active')">Active</button>
    <button class="filter-btn"        data-filter="done"     onclick="setFilter(this,'done')">Done</button>
    <button class="filter-btn"        data-filter="high"     onclick="setFilter(this,'high')">🔴 High</button>
    <button class="filter-btn"        data-filter="overdue"  onclick="setFilter(this,'overdue')">⚠️ Overdue</button>
    <button class="filter-btn"        data-filter="today"    onclick="setFilter(this,'today')">📅 Today</button>
  </div>

  <!-- TASK LIST -->
  <div id="task-list"></div>

</div>

<!-- EDIT MODAL -->
<div class="modal-overlay" id="modal">
  <div class="modal">
    <h2>Edit Task</h2>
    <label class="modal-label">Task Name</label>
    <input type="text" id="edit-text" placeholder="Task name" maxlength="120"/>
    <label class="modal-label">Priority</label>
    <select id="edit-priority">
      <option value="low">🟢 Low</option>
      <option value="med">🟡 Medium</option>
      <option value="high">🔴 High</option>
    </select>
    <label class="modal-label">Category</label>
    <select id="edit-category">
      <option value="">📁 No Category</option>
      <option value="work">💼 Work</option>
      <option value="personal">🏠 Personal</option>
      <option value="school">🎓 School</option>
      <option value="health">💪 Health</option>
      <option value="other">⚡ Other</option>
    </select>
    <label class="modal-label">Due Date</label>
    <input type="date" id="edit-due"/>
    <label class="modal-label">Notes</label>
    <textarea id="edit-notes" placeholder="Optional notes…" rows="2" maxlength="300"></textarea>
    <div class="modal-btns">
      <button class="btn-cancel" onclick="closeModal()">Cancel</button>
      <button class="btn-save"   onclick="saveEdit()">Save Changes</button>
    </div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
